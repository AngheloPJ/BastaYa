<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Basta Ya! - Juego</title>
    <link rel="stylesheet" href="css/game.css">
</head>
<body>
    <div id="gameWrapper">

        <!-- Letra del turno -->
        <div id="letterSection">
            <div id="letterCircle">
                <span id="currentLetter">A</span>
            </div>
        </div>

        <!-- Columnas: jugadores + juego -->
        <div id="columnsRow">
            <div id="playerCol">
                <h3>Jugadores</h3>
                <ul id="playerList"></ul>
            </div>
            <div id="gameCol">
                <!-- Contenido del juego aquí -->
            </div>
        </div>

        <!-- Botón Basta Ya -->
        <div id="buttonRow">
            <button id="bastaYaButton" disabled>¡Basta Ya!</button>
        </div>

    </div>
</body>
</html>
