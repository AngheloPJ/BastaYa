<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Basta Ya! - Juego</title>
    <link rel="stylesheet" href="css/game.css">
</head>
<body>
    <div id="gameWrapper">

        <!-- Letra del turno -->
        <div id="letterSection">
            <div id="letterCircle">
                <span id="currentLetter">A</span>
            </div>
        </div>

        <!-- Columnas: jugadores + juego -->
        <div id="columnsRow">
            <div id="playerCol">
                <h3>Jugadores</h3>
                <ul id="playerList"></ul>
            </div>
            <div id="gameCol">
                <div id="categoriesGrid">
                    <div class="categoryCard"><label class="categoryLabel">Marcas</label><input type="text" class="categoryInput" ></div>
                    <div class="categoryCard"><label class="categoryLabel">Comidas</label><input type="text" class="categoryInput" ></div>
                    <div class="categoryCard"><label class="categoryLabel">Países</label><input type="text" class="categoryInput" ></div>
                    <div class="categoryCard"><label class="categoryLabel">Animales</label><input type="text" class="categoryInput" ></div>
                    <div class="categoryCard"><label class="categoryLabel">Frutas</label><input type="text" class="categoryInput" ></div>
                    <div class="categoryCard"><label class="categoryLabel">Colores</label><input type="text" class="categoryInput" ></div>
                    <div class="categoryCard"><label class="categoryLabel">Películas</label><input type="text" class="categoryInput" ></div>
                    <div class="categoryCard"><label class="categoryLabel">Música</label><input type="text" class="categoryInput" ></div>
                    <div class="categoryCard"><label class="categoryLabel">Libros</label><input type="text" class="categoryInput" ></div>
                </div>
            </div>
        </div>

        <!-- Botón Basta Ya -->
        <div id="buttonRow">
            <button id="bastaYaButton" disabled>¡Basta Ya!</button>
        </div>

    </div>
</body>
</html>
