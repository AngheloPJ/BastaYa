<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Basta Ya! - Puntuación Final</title>
    <link rel="stylesheet" href="css/scores.css">
</head>
<body>
    <div id="scoresWrapper">

        <!-- Título -->
        <div id="scoresHeader">
            <h1 id="scoresTitle">Puntuación Final</h1>
        </div>

        <!-- Tabla de puntuaciones -->
        <div id="scoresPanel">
            <div id="scoresTable">
                <!-- Cabecera -->
                <div class="scoresRow header">
                    <div class="scoresCell rank">#</div>
                    <div class="scoresCell player">Jugador</div>
                    <div class="scoresCell points">Puntos</div>
                </div>
                <!-- Filas de jugadores (se rellenan desde JS) -->
                <div class="scoresRow" id="row1">
                    <div class="scoresCell rank">1</div>
                    <div class="scoresCell player"></div>
                    <div class="scoresCell points"></div>
                </div>
                <div class="scoresRow" id="row2">
                    <div class="scoresCell rank">2</div>
                    <div class="scoresCell player"></div>
                    <div class="scoresCell points"></div>
                </div>
                <div class="scoresRow" id="row3">
                    <div class="scoresCell rank">3</div>
                    <div class="scoresCell player"></div>
                    <div class="scoresCell points"></div>
                </div>
                <div class="scoresRow" id="row4">
                    <div class="scoresCell rank">4</div>
                    <div class="scoresCell player"></div>
                    <div class="scoresCell points"></div>
                </div>
                <div class="scoresRow" id="row5">
                    <div class="scoresCell rank">5</div>
                    <div class="scoresCell player"></div>
                    <div class="scoresCell points"></div>
                </div>
            </div>
        </div>

        <!-- Botón volver a jugar -->
        <div id="buttonRow">
            <button id="playAgainButton">Volver a Jugar</button>
        </div>

    </div>
</body>
</html>
