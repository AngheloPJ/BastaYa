<html lang="en">
<head>

    <title>¡Basta Ya! - Votación</title>
    <link rel="stylesheet" href="css/voting.css">
</head>
<body>
    <div id="votingWrapper">

        <!-- Panel central de votación -->
        <div id="votingPanel">
            <!-- Nombre de la categoría actual -->
            <div id="categoryTitle">
                <span id="categoryName"></span>
            </div>

            <!-- Respuestas como botones -->
            <div id="answersGrid">
                <button class="answerButton"></button>
                <button class="answerButton"></button>
                <button class="answerButton"></button>
                <button class="answerButton"></button>
                <button class="answerButton"></button>
                <button class="answerButton"></button>
            </div>
        </div>

        <!-- Botón de acción -->
        <div id="buttonRow">
            <button id="actionButton">Confirmar</button>
        </div>

    </div>
</body>
</html>
